# GotenNet-L_HAT - Reaction Triplet Pretraining
train_h5: /inspire/ssd/project/cq-nexchem/libowen-253207030265/dataset/React/RGD1_react.h5
val_h5: /inspire/ssd/project/cq-nexchem/libowen-253207030265/dataset/React/t1x_react.h5
batch_size: 64
num_workers: 16
model_name: gotennet_l_hat
emb_dim: 256
inv_layer: 2
se3_layer: 12
heads: 8
atom_vocab_size: 128
cutoff: 5.0
num_kernel: 64
path_dropout: 0.1
activation_dropout: 0.1
attn_dropout: 0.1
teacher_momentum: 0.999
consistency_weight: 1.0
epochs: 20
backbone_lr: 2.0e-5
head_lr: 2.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0
device: cuda
seed: 42
out_dir: runs/gotennet_l_hat_reaction
save_every: 5
