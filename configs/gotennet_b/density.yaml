# GotenNet-B - Electron Density Pretraining
train_mode: electron_density
train_h5:
  - /inspire/qb-ilm/project/chemicalreaction/libowen-253207030265/dataset/EDBench/density_h5_train/*.h5
val_h5:
  - /inspire/qb-ilm/project/chemicalreaction/libowen-253207030265/dataset/EDBench/density_h5_val/*.h5
batch_size: 64
num_workers: 16
mask_ratio: 0.0
noise_std: 0.0
no_center_coords: false
no_recenter_noisy: false
model_name: gotennet_b
emb_dim: 256
inv_layer: 2
se3_layer: 6
heads: 8
atom_vocab_size: 128
cutoff: 5.0
num_kernel: 64
path_dropout: 0.1
activation_dropout: 0.1
attn_dropout: 0.1
density_grid_size: 64
density_weight: 1.0
epochs: 20
lr: 1.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0
warmup_steps: 1000
lr_scheduler: cosine
descriptor_lr: 2.0e-5
head_lr: 2.0e-4
num_query_points: 2048
device: cuda
seed: 42
out_dir: runs/gotennet_b_density
save_every: 5
save_optimizer: true
log_interval: 100
log_file: train.log
center_coords: true
init_strict: false
restart: ""
point_hidden_dim: 128
cond_hidden_dim: 64
head_hidden_dim: 512
radial_sigma: 1.5
