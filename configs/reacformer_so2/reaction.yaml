# ReacFormer SO(2) - Reaction Triplet Pretraining
# Stage 3: Reaction consistency learning (reactant + reagent → product)
# Run: python -m uni_react.train_pretrain_reaction --config configs/reacformer_so2/reaction.yaml

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
train_h5: /inspire/qb-ilm/project/chemicalreaction/libowen-253207030265/dataset/React/RGD1_react.h5
val_h5: /inspire/qb-ilm/project/chemicalreaction/libowen-253207030265/dataset/React/t1x_react.h5
batch_size: 48
num_workers: 16

# ---------------------------------------------------------------------------
# Model architecture - ReacFormer SO(2)
# ---------------------------------------------------------------------------
encoder_type: reacformer_so2
emb_dim: 256
inv_layer: 2
se3_layer: 4
heads: 8
atom_vocab_size: 128
cutoff: 5.0
num_kernel: 128
path_dropout: 0.1
activation_dropout: 0.1
attn_dropout: 0.1

# ---------------------------------------------------------------------------
# Reaction model settings
# ---------------------------------------------------------------------------
teacher_momentum: 0.999
consistency_weight: 1.0

# ---------------------------------------------------------------------------
# Optimisation
# ---------------------------------------------------------------------------
epochs: 20
backbone_lr: 2.0e-5
head_lr: 2.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
device: cuda
seed: 42
out_dir: runs/reacformer_so2_reaction
save_every: 5
# init_ckpt: runs/reacformer_so2_cdft/best.pt  # Load from stage 2
