# SingleMol Encoder - Electron Density Pretraining
# Task: Electron density prediction
# Run: python -m uni_react.train_pretrain_density --config configs/single_mol/density.yaml

# ---------------------------------------------------------------------------
# Training mode
# ---------------------------------------------------------------------------
train_mode: electron_density

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
train_h5:
  - /inspire/ssd/project/cq-nexchem/libowen-253207030265/dataset/EDBench/density_h5_train/*.h5
val_h5:
  - /inspire/ssd/project/cq-nexchem/libowen-253207030265/dataset/EDBench/density_h5_val/*.h5
batch_size: 64          # Smaller batch for density prediction
num_workers: 16

# ---------------------------------------------------------------------------
# Data augmentation (minimal for density)
# ---------------------------------------------------------------------------
# Density pretraining keeps the same augmentation knobs in the config surface,
# even though this recipe leaves them disabled.
mask_ratio: 0.0
noise_std: 0.0
no_center_coords: false
no_recenter_noisy: false

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_name: single_mol

# ---------------------------------------------------------------------------
# Model architecture - SingleMol
# ---------------------------------------------------------------------------
emb_dim: 256
inv_layer: 2
se3_layer: 4
heads: 8
atom_vocab_size: 128
cutoff: 5.0
num_kernel: 128
path_dropout: 0.1
activation_dropout: 0.1
attn_dropout: 0.1

# ---------------------------------------------------------------------------
# Density prediction settings
# ---------------------------------------------------------------------------
# Density-specific placeholder knobs kept explicit in the config surface.
density_grid_size: 64   # Grid resolution for density prediction
density_weight: 1.0

# ---------------------------------------------------------------------------
# Optimisation
# ---------------------------------------------------------------------------
epochs: 20
lr: 1.0e-4              # The density trainer uses descriptor_lr/head_lr below.
weight_decay: 1.0e-2
grad_clip: 1.0
warmup_steps: 1000      # Declared here for config symmetry; current density scheduler ignores it.
lr_scheduler: cosine
descriptor_lr: 2.0e-5
head_lr: 2.0e-4
num_query_points: 2048

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
device: cuda
seed: 42
out_dir: runs/single_mol_density
save_every: 5
save_optimizer: true
log_interval: 100
log_file: train.log
center_coords: true
init_strict: false
restart: ""
point_hidden_dim: 128
cond_hidden_dim: 64
head_hidden_dim: 512
radial_sigma: 1.5
# init_ckpt: runs/single_mol_geometric/best.pt  # Load from stage 1
