# uni-react QM9 fine-tuning configuration  –  target: HOMO-LUMO gap
# Run: python -m uni_react.train_finetune_qm9 --config configs/finetune_qm9_gap.yaml

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data_root: qm9_pyg
split: egnn
targets:
  - gap
batch_size: 256
num_workers: 16
no_center_coords: false

# ---------------------------------------------------------------------------
# Model architecture  (must match pretrained checkpoint)
# ---------------------------------------------------------------------------
model_name: single_mol
emb_dim: 256
inv_layer: 2
se3_layer: 4
heads: 8
atom_vocab_size: 128
cutoff: 5.0
num_kernel: 128
path_dropout: 0.1
activation_dropout: 0.1
attn_dropout: 0.1
head_hidden_dim: 256
head_dropout: 0.1

# ---------------------------------------------------------------------------
# Optimisation
# ---------------------------------------------------------------------------
epochs: 100
backbone_lr: 2.0e-5
head_lr: 1.0e-3
weight_decay: 1.0e-2
grad_clip: 1.0
freeze_backbone_epochs: 0

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
device: cuda
seed: 42
out_dir: runs/qm9_gap
save_every: 10
